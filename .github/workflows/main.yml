name: Deployment
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      - name: Install Dependency
        run: |
          npm install -f

      - name: Build
        run: |
          npm run build --verbose

      - name: Create Deploy Key
        run: |
          echo "${{ secrets.SERVER_PRIVATE_KEY }}" > deploy.key
          cat deploy.key
          chmod 600 deploy.key

      - name: Deploy with rsync
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i deploy.key -p ${{ secrets.SERVER_PORT }}" dist/trip-management/browser/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{secrets.SERVER_DEPLOY_PATH}}