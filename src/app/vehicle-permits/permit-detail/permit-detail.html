<div class="px-8 py-6 w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">
  
  <div class="max-w-[700px] mx-auto">

    <!-- Back Button -->
    <button (click)="goBack()" class="flex items-center gap-2 text-gray-400 hover:text-gray-700 font-bold text-[13px] mb-6 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Permits
    </button>

    <!-- Permit Title -->
    <h1 class="text-[26px] font-extrabold text-gray-900 text-center mb-8">{{ permit.name }}</h1>

    <!-- Detail Cards Stack -->
    <div class="space-y-4">

      <!-- Permit Name -->
      <div class="bg-white border border-gray-100 rounded-2xl px-6 py-5 shadow-sm flex items-center justify-between">
        <div>
          <span class="text-[10px] font-extrabold tracking-widest text-[#f25f2f] uppercase block mb-1.5">Permit Name</span>
          <span class="text-[16px] font-bold text-gray-900">{{ permit.fullName }}</span>
        </div>
        <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-300 flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
        </div>
      </div>

      <!-- Authorizing Body -->
      <div class="bg-white border border-gray-100 rounded-2xl px-6 py-5 shadow-sm flex items-center justify-between">
        <div>
          <span class="text-[10px] font-extrabold tracking-widest text-gray-400 uppercase block mb-1.5">Authorizing Body</span>
          <span class="text-[16px] font-bold text-gray-900">{{ permit.authorizingBody }}</span>
        </div>
        <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-300 flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
      </div>

      <!-- Status -->
      <div class="bg-white border border-gray-100 rounded-2xl px-6 py-5 shadow-sm flex items-center justify-between">
        <div>
          <span class="text-[10px] font-extrabold tracking-widest text-gray-400 uppercase block mb-1.5">Status</span>
          <span class="text-[16px] font-bold text-gray-900 flex items-center gap-2">
            {{ permit.status }}
            <span class="w-2.5 h-2.5 rounded-full" [class.bg-emerald-500]="permit.status === 'Active'" [class.bg-amber-500]="permit.status !== 'Active'"></span>
          </span>
        </div>
        <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" [class.bg-emerald-50]="permit.status === 'Active'" [class.text-emerald-500]="permit.status === 'Active'" [class.bg-amber-50]="permit.status !== 'Active'" [class.text-amber-500]="permit.status !== 'Active'">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
      </div>

      <!-- Date Created -->
      <div class="bg-white border border-gray-100 rounded-2xl px-6 py-5 shadow-sm flex items-center justify-between">
        <div>
          <span class="text-[10px] font-extrabold tracking-widest text-gray-400 uppercase block mb-1.5">Date Created</span>
          <span class="text-[16px] font-bold text-gray-900">{{ permit.createdDate }}</span>
        </div>
        <div class="w-10 h-10 rounded-xl bg-gray-50 text-gray-300 flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
      </div>

    </div>

  </div>
</div>
