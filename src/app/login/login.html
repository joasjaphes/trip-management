<div class="min-h-screen relative flex flex-col items-center justify-center bg-[#f3f4f6] font-sans selection:bg-red-500/20 px-4">
  <!-- Top red accent line -->
  <div class="fixed top-0 left-0 w-full h-[3px] bg-[#f25f2f] z-50"></div>

  <!-- Main Container -->
  <div class="w-full max-w-[440px] z-10">
    <div class="bg-white border border-gray-200 rounded-2xl shadow-xl p-8 sm:p-10 pb-8">
      
      <!-- Logo / Header -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-16 h-16 bg-[#f25f2f] rounded-2xl flex items-center justify-center mb-5 shadow-[0_4px_24px_rgba(240,43,60,0.25)]">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-white">
            <path d="M3.375 4.5C2.339 4.5 1.5 5.34 1.5 6.375V13.5h12V6.375c0-1.036-.84-1.875-1.875-1.875h-8.25zM13.5 15h-12v2.625c0 1.035.84 1.875 1.875 1.875h.375a3 3 0 116 0h3a.75.75 0 00.75-.75V15z" />
            <path d="M8.25 19.5a1.5 1.5 0 10-3 0 1.5 1.5 0 003 0zM15.75 6.75a.75.75 0 00-.75.75v11.25c0 .087.015.17.042.248a3 3 0 015.958.468c.85-.85 1.5-1.928 1.5-3.216V9.006c0-1.258-.84-2.336-2.022-2.736L18.887 5.56a2.25 2.25 0 00-1.638-.685h-1.5v1.875z" />
            <path d="M18.75 19.5a1.5 1.5 0 10-3 0 1.5 1.5 0 003 0z" />
          </svg>
        </div>
        <h1 class="text-gray-800 text-[22px] font-bold mb-1.5 tracking-tight">Easy Tracking Limited</h1>
        <p class="text-gray-400 text-sm">Secure Logistics Portal Access</p>
      </div>

      <!-- General Error Alert -->
      @if (errorMessage()) {
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 flex items-center gap-3 text-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        
        <!-- Username -->
        <div class="space-y-2">
          <label class="block text-gray-700 text-sm font-semibold tracking-wide">Username</label>
          <div class="relative flex items-center bg-white border border-gray-200 focus-within:border-red-400 focus-within:ring-1 focus-within:ring-red-400 rounded-lg transition-all duration-200">
            <div class="absolute left-4 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
              </svg>
            </div>
            <input
              type="text"
              class="w-full bg-transparent text-gray-800 pl-12 pr-4 py-3 placeholder-gray-300 outline-none text-sm"
              placeholder="Enter your username"
              [(ngModel)]="username"
              name="username"
              required
              [disabled]="isLoading()"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="block text-gray-700 text-sm font-semibold tracking-wide">Password</label>
            <a href="#" class="text-xs text-[#f25f2f] hover:text-[#d82231] transition-colors font-medium">Forgot password?</a>
          </div>
          <div class="relative flex items-center bg-white border border-gray-200 focus-within:border-red-400 focus-within:ring-1 focus-within:ring-red-400 rounded-lg transition-all duration-200">
            <div class="absolute left-4 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                <path fill-rule="evenodd" d="M12 1.5a5.25 5.25 0 00-5.25 5.25v3a3 3 0 00-3 3v6.75a3 3 0 003 3h10.5a3 3 0 003-3v-6.75a3 3 0 00-3-3v-3c0-2.9-2.35-5.25-5.25-5.25zm3.75 8.25v-3a3.75 3.75 0 10-7.5 0v3h7.5z" clip-rule="evenodd" />
              </svg>
            </div>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              class="w-full bg-transparent text-gray-800 pl-12 pr-12 py-3 placeholder-gray-300 outline-none text-sm"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              required
              [disabled]="isLoading()"
            />
            <button
              type="button"
              class="absolute right-4 text-gray-400 hover:text-gray-600 transition-colors"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading()"
            >
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                  <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
                  <path fill-rule="evenodd" d="M1.323 11.447C2.811 6.976 7.028 3.75 12.001 3.75c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113-1.487 4.471-5.705 7.697-10.677 7.697-4.97 0-9.186-3.223-10.675-7.69a1.762 1.762 0 010-1.113zM17.25 12a5.25 5.25 0 11-10.5 0 5.25 5.25 0 0110.5 0z" clip-rule="evenodd" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                  <path d="M3.53 2.47a.75.75 0 00-1.06 1.06l18 18a.75.75 0 101.06-1.06l-18-18zM22.676 12.553a11.249 11.249 0 01-2.631 4.31l-3.099-3.099a5.25 5.25 0 00-6.71-6.71L7.759 4.577a11.217 11.217 0 014.242-.827c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113z" />
                  <path d="M15.75 12c0 .18-.013.357-.037.53l-4.244-4.243A3.75 3.75 0 0115.75 12zM12.53 15.713l-4.243-4.244a3.75 3.75 0 004.243 4.243z" />
                  <path d="M6.75 12c0-.619.143-1.205.399-1.742L4.692 7.8A11.25 11.25 0 001.323 11.447c-.12.362-.12.752 0 1.113 1.487 4.471 5.705 7.697 10.677 7.697.55 0 1.089-.04 1.615-.117l-3.24-3.24a3.75 3.75 0 01-3.626-4.908z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center pt-1">
          <label class="flex items-center gap-3 cursor-pointer group">
            <div class="relative flex items-center justify-center">
              <input type="checkbox" class="peer appearance-none w-[18px] h-[18px] bg-white border border-gray-300 rounded shadow-sm checked:bg-white checked:border-gray-300 transition-colors cursor-pointer" />
              <svg xmlns="http://www.w3.org/2000/svg" class="absolute w-3.5 h-3.5 text-gray-500 opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" />
              </svg>
            </div>
            <span class="text-sm text-gray-500 group-hover:text-gray-700 transition-colors">Remember me for 30 days</span>
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-[#f25f2f] hover:bg-[#d82231] active:bg-[#bd1826] text-white font-semibold py-3 rounded-lg shadow-[0_4px_16px_rgba(240,43,60,0.3)] transition-all flex items-center justify-center gap-2 mt-2 disabled:opacity-70 disabled:cursor-not-allowed"
          [disabled]="isLoading()"
        >
          @if (isLoading()) {
            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing In...
          } @else {
            Sign In to Dashboard
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 ml-1">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          }
        </button>
      </form>

      <!-- Bottom Form Area Divider -->
      <div class="w-full flex justify-center mt-8 mb-6">
        <div class="h-px w-full bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>
      </div>

      <!-- Footer Text -->
      <div class="text-center text-[13px] text-gray-400">
        Don't have an account yet? 
        <a href="#" class="text-[#f25f2f] font-medium hover:text-[#d82231] transition-colors ml-1">Contact Administrator</a>
      </div>
    </div>

    <!-- Bottom Links -->
    <!-- <div class="mt-8 flex justify-center gap-6 text-[11px] text-gray-400 font-semibold tracking-[0.15em]">
      <a href="#" class="hover:text-gray-600 transition-colors">PRIVACY POLICY</a>
      <a href="#" class="hover:text-gray-600 transition-colors">TERMS OF SERVICE</a>
      <a href="#" class="hover:text-gray-600 transition-colors">SUPPORT</a>
    </div> -->
  </div>

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
        <path fill-rule="evenodd" d="M12.516 2.17a.75.75 0 00-1.032 0 11.209 11.209 0 01-7.877 3.08.75.75 0 00-.722.515A12.74 12.74 0 002.25 9.75c0 5.942 4.064 10.933 9.563 12.348a.749.749 0 00.374 0c5.499-1.415 9.563-6.406 9.563-12.348 0-1.39-.223-2.73-.635-3.985a.75.75 0 00-.722-.516l-.143.001c-2.996 0-5.717-1.17-7.734-3.08zm3.094 8.016a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" />
      </svg>
    </div>
    <div class="flex flex-col">
      <span class="text-gray-800 text-[13px] font-bold tracking-wide">Enterprise Security</span>
      <span class="text-gray-400 text-[11px] font-medium tracking-wide">256-bit SSL Encrypted Connection</span>
    </div>
  </div> -->

</div>
