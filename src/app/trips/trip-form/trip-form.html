<div class="px-8 py-6 w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">
  
  <div class="max-w-[1200px] mx-auto bg-white border border-gray-100 rounded-2xl p-8 relative overflow-hidden shadow-sm">
    
    <!-- Background Watermark -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute top-4 right-8 w-40 h-40 text-gray-100 opacity-60 pointer-events-none stroke-[1.5]">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 9h12a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6a2 2 0 012-2z" />
    </svg>

    <!-- Header Section -->
    <div class="flex items-center gap-3 mb-10 relative z-10">
      <div class="w-6 h-6 rounded-full border-2 border-[#f02b3c] text-[#f02b3c] flex items-center justify-center font-bold text-[14px] leading-none shrink-0">
        +
      </div>
      <h2 class="text-xl font-extrabold text-gray-900 tracking-wide">New Trip Details</h2>
    </div>

    <!-- Main Details Form Grid -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-x-6 gap-y-8 mb-12 relative z-10">
      <!-- Start Date -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Start Date</label>
        <div class="relative">
          <input type="text" placeholder="mm/dd/yyyy" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
      </div>
      <!-- End Date -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">End Date (Est.)</label>
        <div class="relative">
          <input type="text" placeholder="mm/dd/yyyy" class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
        </div>
      </div>
      <!-- Vehicle -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Vehicle</label>
        <div class="relative">
          <select class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
            <option value="" disabled selected class="text-gray-300">Select Vehicle</option>
          </select>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
      <!-- Driver -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Driver</label>
        <div class="relative">
          <select class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
            <option value="" disabled selected class="text-gray-300">Select Driver</option>
          </select>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      <!-- Route Selection -->
      <div class="flex flex-col gap-2 md:col-span-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Route Selection</label>
        <div class="relative">
          <select class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
            <option value="" disabled selected class="text-gray-300">Select Route</option>
          </select>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
      <!-- Projected Revenue -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Projected Revenue</label>
        <div class="relative">
          <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-[14px] pointer-events-none">$</div>
          <input type="text" placeholder="0.00" class="w-full bg-white border border-gray-200 rounded-lg pl-8 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
        </div>
      </div>
      <!-- Status -->
      <div class="flex flex-col gap-2">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Status</label>
        <div class="relative">
          <select class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
            <option value="pending" selected>pending</option>
            <option value="in-progress">in-progress</option>
            <option value="completed">completed</option>
            <option value="cancelled">cancelled</option>
          </select>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

      <!-- Notes -->
      <div class="flex flex-col gap-2 md:col-span-4">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Notes</label>
        <textarea rows="4" placeholder="Add specific trip requirements or cargo details..." class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300 resize-none"></textarea>
      </div>
    </div>


    <!-- Expenses Section Border Divider -->
    <hr class="border-gray-100 my-8 relative z-10">

    <!-- Header Section -->
    <div class="flex items-center justify-between mb-6 relative z-10">
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-5 h-5 text-[#f02b3c]">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <h3 class="text-[16px] font-extrabold text-gray-900 tracking-wide">Trip Expenses</h3>
      </div>
      <button class="text-[#f02b3c] hover:text-[#d62434] transition-colors font-bold text-[13px] tracking-wide inline-flex items-center gap-2">
        + Add Expense
      </button>
    </div>

    <!-- Expenses Row Header -->
    <div class="grid grid-cols-12 gap-x-4 mb-2 px-2 relative z-10">
      <div class="col-span-3 text-[10px] font-extrabold tracking-widest text-gray-400 uppercase">Category</div>
      <div class="col-span-2 text-[10px] font-extrabold tracking-widest text-gray-400 uppercase">Amount</div>
      <div class="col-span-3 text-[10px] font-extrabold tracking-widest text-gray-400 uppercase">Date</div>
      <div class="col-span-4 text-[10px] font-extrabold tracking-widest text-gray-400 uppercase">Attachment</div>
    </div>

    <!-- Expense Row Instance -->
    <div class="bg-gray-50 rounded-xl p-2 grid grid-cols-12 gap-x-4 items-center mb-8 relative z-10">
      <!-- Category -->
      <div class="col-span-3 relative">
        <select class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
          <option value="fuel" selected>Fuel</option>
          <option value="toll">Toll</option>
          <option value="food">Food</option>
        </select>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
      <!-- Amount -->
      <div class="col-span-2">
        <input type="text" placeholder="0.00" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
      </div>
      <!-- Date -->
      <div class="col-span-3 relative">
        <input type="text" placeholder="mm/dd/yyyy" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
      <!-- Attachment and Delete Action -->
      <div class="col-span-4 flex items-center gap-3 pr-2">
        <label class="flex-1 cursor-pointer w-full flex items-center justify-center gap-2 border border-dashed border-gray-300 rounded-lg bg-white hover:bg-gray-50 py-2.5 transition-colors text-gray-400 hover:text-[#f02b3c]">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          <input type="file" class="hidden">
        </label>
        <!-- Trash Icon -->
        <button class="text-gray-400 hover:text-[#f02b3c] transition-colors shrink-0 p-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-[18px] h-[18px]">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Form Footer Actions -->
    <div class="flex items-center justify-end gap-6 relative z-10 pt-4">
      <button (click)="goBack()" class="text-gray-500 hover:text-gray-800 font-bold text-[14px] tracking-wide transition-colors">
        Cancel
      </button>
      <button class="btn border-none bg-[#f02b3c] hover:bg-[#d62434] text-white px-8 font-bold shadow-[0_4px_12px_rgba(240,43,60,0.25)]">
        Create Trip
      </button>
    </div>

  </div>
</div>
