<form class="w-full flex flex-col gap-4" (ngSubmit)="onSubmit()">
    <!-- Error message -->
    @if (error()) {
        <div class="alert alert-error">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l-2-2m0 0l-2-2m2 2l2-2m-2 2l-2 2m2-2l2 2M9 1a8 8 0 018 8v10H1V9a8 8 0 018-8z" />
            </svg>
            <span>{{ error() }}</span>
        </div>
    }

    <!-- Route Information -->
    <div class="divider">Route Information</div>
    <div class="w-full flex flex-col">
        <label for="name" class="font-semibold mb-2">Route Name</label>
        <input id="name" type="text" class="input input-bordered w-full focus:outline-none" 
            [(ngModel)]="name" 
            [ngModelOptions]="{updateOn: 'blur'}"
            name="name"
            aria-required="true" 
            placeholder="e.g., Dar es salaam - Lubumbashi"
            [disabled]="isLoading()">
    </div>

    <!-- Location Information -->
    <div class="divider">Location Details</div>
    <div class="w-full grid grid-cols-2 gap-4">
        <div class="flex flex-col">
            <label for="startLocation" class="font-semibold mb-2">Start Location</label>
            <input id="startLocation" type="text" class="input input-bordered w-full focus:outline-none" 
                [(ngModel)]="startLocation"
                [ngModelOptions]="{updateOn: 'blur'}"
                name="startLocation"
                placeholder="e.g., Dar es salaam Bus Terminal"
                [disabled]="isLoading()">
        </div>
        <div class="flex flex-col">
            <label for="endLocation" class="font-semibold mb-2">End Location</label>
            <input id="endLocation" type="text" class="input input-bordered w-full focus:outline-none" 
                [(ngModel)]="endLocation"
                [ngModelOptions]="{updateOn: 'blur'}"
                name="endLocation"
                placeholder="e.g., Lubumbashi Central Station"
                [disabled]="isLoading()">
        </div>
    </div>

    <!-- Distance and Duration -->
    <div class="divider">Distance & Duration</div>
    <div class="w-full grid grid-cols-2 gap-4">
        <div class="flex flex-col">
            <label for="mileage" class="font-semibold mb-2">Mileage (km)</label>
            <input id="mileage" type="number" class="input input-bordered w-full focus:outline-none" 
                [(ngModel)]="mileage"
                [ngModelOptions]="{updateOn: 'blur'}"
                name="mileage"
                aria-required="true" 
                placeholder="e.g., 45"
                [disabled]="isLoading()">
        </div>
        <div class="flex flex-col">
            <label for="estimatedDuration" class="font-semibold mb-2">Estimated Duration (days)</label>
            <input id="estimatedDuration" type="number" class="input input-bordered w-full focus:outline-none" 
                [(ngModel)]="estimatedDuration"
                [ngModelOptions]="{updateOn: 'blur'}"
                name="estimatedDuration"
                placeholder="e.g., 2"
                [disabled]="isLoading()">
        </div>
    </div>

    <div class="flex items-center gap-2">
        <input type="checkbox" id="isActive" class="checkbox" 
            [checked]="isActive()"
            (change)="isActive.set(!isActive())"
            [disabled]="isLoading()"
            aria-label="Is Active">
        <label for="isActive" class="text-sm font-medium">Active</label>
    </div>

    <!-- Action buttons -->
    <div class="flex gap-2 pt-4 border-t">
        <button type="submit" class="btn btn-primary flex-1" [disabled]="isLoading() || !name().trim() || !mileage()">
            @if (isLoading()) {
                <span class="loading loading-spinner"></span>
            } @else {
                Save Route
            }
        </button>
        <button type="button" class="btn btn-outline flex-1" (click)="reset()" [disabled]="isLoading()">
            Cancel
        </button>
    </div>
</form>
