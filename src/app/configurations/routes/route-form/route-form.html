<div class="px-8 py-6 w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">
  
  <div class="max-w-[900px] mx-auto">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-[28px] font-extrabold text-gray-900 leading-tight">Add New Route</h1>
      <p class="text-[14px] font-medium text-gray-400 mt-1">Configure a new transport route including locations, distance, and timing details.</p>
    </div>

    <!-- Route Details Card -->
    <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm mb-6">

      <!-- Route Name -->
      <div class="mb-7">
        <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase block mb-2">Route Name</label>
        <input type="text" placeholder="e.g. Northeast Logistics Corridor" [(ngModel)]="routeName" name="routeName"
               class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
      </div>

      <!-- Start / End Location -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-7">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Start Location</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#f02b3c]">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </span>
            <input type="text" placeholder="City, Region or Warehouse ID" [(ngModel)]="startLocation" name="startLocation"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">End Location</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9" />
              </svg>
            </span>
            <input type="text" placeholder="City, Region or Destination ID" [(ngModel)]="endLocation" name="endLocation"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
      </div>

      <!-- Mileage / Duration -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Total Mileage (KM)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
              </svg>
            </span>
            <input type="text" placeholder="0.00" [(ngModel)]="mileage" name="mileage"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-gray-400 uppercase">Estimated Duration (Mins)</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </span>
            <input type="text" placeholder="e.g. 480" [(ngModel)]="estimatedDuration" name="estimatedDuration"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-between pt-2 pb-8">
      <div class="flex items-center gap-3">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" [checked]="isActive" (change)="isActive = !isActive" class="sr-only peer">
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#f02b3c]"></div>
        </label>
        <span class="text-[13px] font-extrabold text-gray-700 uppercase tracking-wider">Active Route</span>
      </div>
      <div class="flex items-center gap-4">
        <button (click)="goBack()" class="btn border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 px-6 font-bold rounded-lg">
          Cancel
        </button>
        <button (click)="onSubmit()" class="btn border-none bg-[#f02b3c] hover:bg-[#d62434] text-white px-8 font-bold shadow-[0_4px_12px_rgba(240,43,60,0.25)] rounded-lg flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Create Route
        </button>
      </div>
    </div>

  </div>
</div>
