<app-layout
  [title]="title()"
  [description]="description()"
  [addText]="addText()"
  (add)="onAdd()"
  [(viewDetails)]="viewDetails"
  [formTitle]="formTitle()"
  [formDescription]="formDescription()"
>
  <ng-container ngProjectAs="main">
    <app-data-table [data]="customers()" [config]="tableConfigurations" (edit)="onEdit($event)" [loading]="loading()"></app-data-table>
  </ng-container>

  <ng-container ngProjectAs="form">
    @if (viewType() === 'add' || viewType() === 'edit') {
      <app-customer-form (close)="onCloseForm()" [currentCustomer]="selectedCustomer()"></app-customer-form>
    }
  </ng-container>
</app-layout>
