<app-layout
  [title]="title()"
  [description]="description()"
  [addText]="addText()"
  (add)="onAdd()"
  [(viewDetails)]="viewDetails"
  [formTitle]="formTitle()"
  [formDescription]="formDescription()"
>
  <ng-container ngProjectAs="main">
    <app-data-table [data]="customers()" [config]="tableConfigurations"></app-data-table>
  </ng-container>

  <ng-container ngProjectAs="form">
    @if (viewType() === 'add') {
      <app-customer-form (close)="onCloseForm()"></app-customer-form>
    }
  </ng-container>
</app-layout>
