<div class="w-full">
    <div class="w-full">
        <label for="companyName">Company name</label>
        <input type="text" id="companyName" name="companyName" [(ngModel)]="companyName" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="tin">Tax Identification Number (TIN)</label>
        <input type="text" id="tin" name="tin" [(ngModel)]="tin" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="address">Postal Address</label>
        <input type="text" id="address" name="address" [(ngModel)]="postalAddress" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="country">Country</label>
        <input type="text" id="country" name="country" [(ngModel)]="country" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="region">Region</label>
        <input type="text" id="region" name="region" [(ngModel)]="region" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="district">District</label>
        <input type="text" id="district" name="district" [(ngModel)]="district" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="street">Street</label>
        <input type="text" id="street" name="street" [(ngModel)]="street" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full">
        <label for="plot">Plot Number</label>
        <input type="text" id="plot" name="plot" [(ngModel)]="plot" class="w-full border border-gray-300 rounded-md p-2">
    </div>
    <div class="w-full mt-4">
        <app-save-area (save)="onSubmit()" [loading]="saving()" [saveText]="saveText()" [showCancel]="showCancel()"></app-save-area>
    </div>
</div>
