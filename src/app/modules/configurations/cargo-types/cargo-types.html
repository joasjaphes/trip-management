<app-layout [title]="title()" [description]="description()" [addText]="addText()" (add)="onAdd()"
  [(viewDetails)]="viewDetails" [formTitle]="formTitle()" [formDescription]="formDescription()">
  <ng-container ngProjectAs="main">
    <app-data-table [data]="cargoTypes()" [config]="tableConfigurations" (edit)="onEdit($event)" [loading]="loading()"></app-data-table>
  </ng-container>

  <ng-container ngProjectAs="form">
    @if (viewType() === 'add' || viewType() === 'edit') {
      <app-cargo-type-form [cargoType]="selectedCargoType()" (close)="onCloseForm()"></app-cargo-type-form>
    }
  </ng-container>
</app-layout>
