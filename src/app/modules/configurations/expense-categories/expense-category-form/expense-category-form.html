<div class="w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">
  
  <div class="max-w-[800px] mx-auto">
    @if (actionMessage()) {
      <div class="mb-4 rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 text-[13px] font-semibold text-blue-700 flex items-center gap-2">
        <span class="loading loading-spinner loading-sm"></span>
        <span>{{ actionMessage() }}</span>
      </div>
    }

    @if (successMessage()) {
      <div class="mb-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-[13px] font-semibold text-emerald-700">{{ successMessage() }}</div>
    }

    @if (errorMessage()) {
      <div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-[13px] font-semibold text-red-700">{{ errorMessage() }}</div>
    }

    <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm mb-6">

      <!-- Category Name -->
      <div class="mb-6">
        <label class="text-[13px] font-bold text-gray-700 block mb-2">Expense Name</label>
        <input type="text" placeholder="e.g. Fuel, Maintenance, Permits" [(ngModel)]="expenseName" name="expenseName"
               class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
      </div>

      <!-- Parent Category -->
      <div class="mb-8">
        <label class="text-[13px] font-bold text-gray-700 block mb-2">Expense Category</label>
        <div class="relative">
          <select [(ngModel)]="category" name="category"
                  class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors appearance-none cursor-pointer">
            <option value="GENERAL">General Expenses</option>
            <option value="OTHER">Other Expenses</option>
          </select>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>
      <div class="bg-gray-50 border border-gray-100 rounded-xl px-6 py-4 flex items-center justify-between">
        <div>
          <h3 class="text-[15px] font-extrabold text-gray-900">Status</h3>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" [checked]="isActive" (change)="isActive = !isActive" class="sr-only peer">
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#f25f2f]"></div>
        </label>
      </div>
    </div>

    <app-save-area [saveText]="'Save Category'" [loading]="loading()" (cancel)="goBack()" (save)="onSubmit()"></app-save-area>

  </div>
</div>
