<div class="w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">
  
  <div class="max-w-[900px] mx-auto">

    <!-- Driver Photo Section -->
    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-6 flex items-center gap-6">
      <div class="w-20 h-20 rounded-2xl bg-gray-100 flex items-center justify-center text-gray-300 shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
      <div>
        <h3 class="text-[15px] font-bold text-gray-900">Driver Photo</h3>
        <p class="text-[13px] text-gray-400 mt-0.5">Upload a clear front-facing portrait (JPG or PNG, max 5MB)</p>
        <div class="flex items-center gap-3 mt-2">
          <button class="text-[#f25f2f] font-bold text-[13px] hover:text-[#ff5117] transition-colors">Upload photo</button>
          <button class="text-gray-400 font-medium text-[13px] hover:text-gray-600 transition-colors">Remove</button>
        </div>
      </div>
    </div>

    <!-- Personal Information Section -->
    <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm mb-6">
      <div class="flex items-center gap-3 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#f25f2f]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <h2 class="text-[16px] font-extrabold text-gray-900">Personal Information</h2>
      </div>

      <div class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">First Name</label>
            <input type="text" placeholder="e.g. Michael" [(ngModel)]="firstName" name="firstName"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Last Name</label>
            <input type="text" placeholder="e.g. Scott" [(ngModel)]="lastName" name="lastName"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Email Address</label>
            <input type="email" placeholder="m.scott@paper.com" [(ngModel)]="email" name="email"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Phone Number</label>
            <input type="tel" placeholder="+255 7XX XXX XXXX" [(ngModel)]="phone" name="phone"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Date of Birth</label>
            <div class="relative">
              <input type="date" placeholder="mm/dd/yyyy" [(ngModel)]="dateOfBirth" name="dateOfBirth"
                     class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
              <!-- <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg> -->
            </div>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Driver ID / System Reference</label>
            <input type="text" placeholder="DRV-9921" [(ngModel)]="driverId" name="driverId"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-[13px] font-bold text-gray-700">Residential Address</label>
          <input type="text" placeholder="e.g. Mbezi Beach, Dar es Salaam" [(ngModel)]="address" name="address"
                 class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
        </div>
      </div>
    </div>

    <!-- License Details Section -->
    <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm mb-6">
      <div class="flex items-center gap-3 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#f25f2f]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
        </svg>
        <h2 class="text-[16px] font-extrabold text-gray-900">License Details</h2>
      </div>

      <div class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">License Number</label>
            <input type="text" placeholder="D1234-56789-01234" [(ngModel)]="licenseNumber" name="licenseNumber"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">License Class</label>
            <div class="relative">
              <select [(ngModel)]="licenseClass" name="licenseClass"
                      class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors appearance-none cursor-pointer">
                <option value="" disabled selected>Select Class</option>
                <option value="Class A">Class A (Commercial)</option>
                <option value="Class B">Class B (Heavy Vehicle)</option>
                <option value="Class C">Class C (Light Vehicle)</option>
                <option value="Class D">Class D (Motorcycle)</option>
                <option value="Class E">Class E (Special)</option>
              </select>
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Issuing Authority</label>
            <input type="text" placeholder="e.g. SUMATRA" [(ngModel)]="issuingAuthority" name="issuingAuthority"
                   class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[13px] font-bold text-gray-700">Expiry Date</label>
            <div class="relative">
              <input type="text" placeholder="mm/dd/yyyy" [(ngModel)]="licenseExpiry" name="licenseExpiry"
                     class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f25f2f] transition-colors placeholder-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Active Status Toggle -->
    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm mb-8 flex items-center justify-between">
      <div>
        <h3 class="text-[15px] font-extrabold text-gray-900">Active Status</h3>
        <p class="text-[13px] text-gray-400 mt-0.5">Allow this driver to be assigned to active routes immediately.</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" [checked]="isActive" (change)="isActive = !isActive" class="sr-only peer">
        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#f25f2f]"></div>
      </label>
    </div>

  </div>

  <div>
    <app-save-area [loading]="loading()" (save)="onSubmit()" (cancel)="goBack()"></app-save-area>
  </div>
</div>
