<app-layout [title]="title()" [description]="description()" [addText]="addText()" (add)="onAdd()"
  [(viewDetails)]="viewDetails" [formTitle]="formTitle()" [formDescription]="formDescription()" [splitSize]="splitSize()" [(showAddButton)]="showAddButton">
  <ng-container ngProjectAs="main">
    <app-data-table [data]="trips()" [config]="tableConfigurations" (view)="onView($event)" (edit)="onEdit($event)" [moreActions]="moreActions()" [loading]="loading()"></app-data-table>
  </ng-container>
  <ng-container ngProjectAs="form">
    @if (viewType() == 'add' || viewType() == 'edit') {
    <app-trip-form [trip]="selectedTrip()" (close)="onCloseForm()"></app-trip-form>
    } @else if (viewType() == 'detail') {
    <app-trip-detail
      [trip]="selectedTrip()"
      [completing]="loading()"
      (complete)="completeTrip($event)"
      (close)="onCloseDetail()"
    ></app-trip-detail>
    } @else if (viewType() == 'manage-expense') {
    <app-trip-expenses-manage
      [trip]="selectedTrip()"
      (saved)="onExpensesChanged()"
      (close)="onCloseDetail()"
    ></app-trip-expenses-manage>
    }
  </ng-container>
</app-layout>
