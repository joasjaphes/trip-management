<div class="px-8 py-6 w-full h-full overflow-y-auto bg-[#f3f4f6] text-gray-800">

  <div class="max-w-[900px] mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-[22px] font-extrabold text-gray-900">Add New User</h1>
        <p class="text-[13px] font-medium text-gray-400 mt-0.5">Create a new employee account with access permissions.</p>
      </div>
    </div>

    <!-- Form Card -->
    <div class="bg-white border border-gray-100 rounded-2xl p-8 shadow-sm mb-6">

      <!-- First Name / Last Name -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-7">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">First Name</label>
          <input type="text" placeholder="Enter first name" [(ngModel)]="firstName" name="firstName"
                 class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">Last Name</label>
          <input type="text" placeholder="Enter last name" [(ngModel)]="lastName" name="lastName"
                 class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
        </div>
      </div>

      <!-- Username / Email -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-7">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">Username</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
              </svg>
            </span>
            <input type="text" placeholder="Enter username" [(ngModel)]="username" name="username"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">Email Address</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </span>
            <input type="email" placeholder="Enter email address" [(ngModel)]="email" name="email"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
      </div>

      <!-- Phone / Role -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">Phone Number</label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
              </svg>
            </span>
            <input type="tel" placeholder="Enter phone number" [(ngModel)]="phone" name="phone"
                   class="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors placeholder-gray-300">
          </div>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[11px] font-extrabold tracking-widest text-[#f02b3c] uppercase">User Role</label>
          <div class="relative">
            <select [(ngModel)]="role" name="role"
                    class="w-full bg-white border border-gray-200 rounded-lg px-4 py-3 text-[14px] text-gray-800 focus:outline-none focus:border-[#f02b3c] transition-colors appearance-none cursor-pointer">
              <option value="ADMIN">ADMIN</option>
              <option value="MANAGER">MANAGER</option>
              <option value="VIEWER">VIEWER</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-300 pointer-events-none">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Active Status -->
      <div class="bg-gray-50 border border-gray-100 rounded-xl px-6 py-4 flex items-center gap-4">
        <div class="w-9 h-9 rounded-full bg-emerald-50 text-emerald-500 flex items-center justify-center shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-[14px] font-extrabold text-gray-900">Active Status</h3>
          <p class="text-[12px] text-gray-400 mt-0.5">Allow this user to access the management dashboard.</p>
        </div>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" [checked]="isActive" (change)="isActive = !isActive" class="sr-only peer">
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#f02b3c]"></div>
        </label>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="flex items-center justify-end gap-4 pt-2 pb-8">
      <button (click)="goBack()" class="btn border border-gray-200 bg-white hover:bg-gray-50 text-gray-700 px-8 font-bold rounded-lg">
        Cancel
      </button>
      <button (click)="onSubmit()" class="btn border-none bg-[#f02b3c] hover:bg-[#d62434] text-white px-8 font-bold shadow-[0_4px_12px_rgba(240,43,60,0.25)] rounded-lg">
        Save Changes
      </button>
    </div>

  </div>
</div>
